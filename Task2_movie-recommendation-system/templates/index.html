<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineMatch — AI Movie Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f13;
      color: #eeeef5;
      min-height: 100vh;
    }
 
    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: -0.3px;
    }
    .ai-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(108,99,255,0.15);
      color: #a78bfa;
      border: 1px solid rgba(108,99,255,0.3);
      letter-spacing: 0.05em;
    }
 
    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 64px 20px 48px;
    }
    .hero h1 {
      font-size: 52px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 14px;
      letter-spacing: -1px;
    }
    .hero h1 span {
      background: linear-gradient(135deg, #a78bfa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 16px;
      color: #6b7280;
      margin-bottom: 36px;
    }
 
    /* ── Search ── */
    .search-box {
      display: flex;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto 12px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #1a1a22;
      color: #eeeef5;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #6c63ff; }
    .search-box button {
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .search-box button:hover { opacity: 0.9; transform: scale(1.02); }
    .search-box button:active { transform: scale(0.97); }
    .hint { font-size: 12px; color: #4b5563; }
 
    /* ── Loading ── */
    .loading {
      display: none;
      text-align: center;
      padding: 48px 20px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,255,255,0.08);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 14px; color: #6b7280; }
 
    /* ── Error ── */
    .error {
      display: none;
      text-align: center;
      padding: 16px;
      color: #f87171;
      font-size: 14px;
      font-weight: 500;
    }
 
    /* ── Results section ── */
    .results {
      display: none;
      max-width: 1100px;
      margin: 0 auto 80px;
      padding: 0 24px;
    }
    .results-title {
      font-size: 13px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
    }
 
    /* ── Grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }
 
    /* ── Movie card ── */
    .movie-card {
      background: #1a1a22;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
      animation: riseIn 0.35s ease both;
    }
    .movie-card:hover {
      border-color: rgba(108,99,255,0.45);
      transform: translateY(-5px);
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .movie-card:nth-child(1) { animation-delay: 0.05s; }
    .movie-card:nth-child(2) { animation-delay: 0.10s; }
    .movie-card:nth-child(3) { animation-delay: 0.15s; }
    .movie-card:nth-child(4) { animation-delay: 0.20s; }
    .movie-card:nth-child(5) { animation-delay: 0.25s; }
 
    /* ── Poster fills top of card ── */
    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2/3;
      background: #22222e;
      overflow: hidden;
    }
    .poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .movie-card:hover .poster { transform: scale(1.04); }
 
    .rank-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: rgba(167,139,250,0.9);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .movie-card:first-child .rank-badge {
      background: rgba(251,191,36,0.85);
      color: #000;
      border-color: #fbbf24;
    }
 
    .no-poster {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: #1c1c28;
    }
 
    /* ── Card info ── */
    .card-info {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .movie-title {
      font-size: 13px;
      font-weight: 600;
      color: #eeeef5;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .bar-bg {
      flex: 1;
      height: 3px;
      background: #2a2a38;
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c63ff, #a78bfa);
      border-radius: 2px;
      transition: width 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .bar-pct {
      font-size: 10px;
      color: #a78bfa;
      font-weight: 600;
      min-width: 28px;
    }
    .score-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }
    .score-num {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
      line-height: 1;
    }
    .score-lbl {
      font-size: 10px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
 
    /* ── Responsive ── */
    @media (max-width: 900px) {
      .cards { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .hero h1 { font-size: 34px; }
      header { padding: 16px 20px; }
      .search-box { flex-direction: column; }
      .cards { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .results { padding: 0 16px; }
    }
    @media (max-width: 380px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
 
  <header>
    <div class="logo">🎬 CineMatch</div>
    <span class="ai-badge">AI Powered</span>
  </header>
 
  <section class="hero">
    <h1>Discover your next<br><span>favourite movie</span></h1>
    <p>Enter a user ID and our AI finds your perfect match</p>
    <div class="search-box">
      <input type="number" id="userInput" placeholder="Enter user ID (1 to 943)" min="1" max="943">
      <button onclick="getRecommendations()">Recommend →</button>
    </div>
    <p class="hint">Try: 1 · 50 · 200 · 543 · 800</p>
  </section>
 
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Finding your perfect movies…</p>
  </div>
 
  <div class="error" id="error"></div>
 
  <section class="results" id="results">
    <div class="results-title" id="resultsTitle"></div>
    <div class="cards" id="cards"></div>
  </section>
 
<script>
  document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') getRecommendations();
  });
 
  async function getRecommendations() {
    const userId = document.getElementById('userInput').value.trim();
    if (!userId || userId < 1 || userId > 943) {
      showError('Please enter a number between 1 and 943');
      return;
    }
 
    clearAll();
    document.getElementById('loading').style.display = 'block';
 
    try {
      const response = await fetch(`/recommend?user_id=${userId}`);
      const movies = await response.json();
      document.getElementById('loading').style.display = 'none';
 
      if (!movies.length) {
        showError('No recommendations found for this user.');
        return;
      }
 
      document.getElementById('resultsTitle').textContent =
        `Top 5 recommendations for User ${userId}`;
 
      const maxScore = movies[0].score;
      let html = '';
 
      movies.forEach((movie, index) => {
        const percent = Math.round((movie.score / maxScore) * 100);
        const posterHtml = movie.poster && !movie.poster.includes('placeholder')
          ? `<img class="poster" src="${movie.poster}" alt="${movie.title}"
                  onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const fallbackStyle = (movie.poster && !movie.poster.includes('placeholder'))
          ? 'display:none' : 'display:flex';
 
        html += `
          <div class="movie-card">
            <div class="poster-wrap">
              ${posterHtml}
              <div class="no-poster" style="${fallbackStyle}">🎬</div>
              <div class="rank-badge">${index + 1}</div>
            </div>
            <div class="card-info">
              <div class="movie-title">${movie.title}</div>
              <div class="bar-row">
                <div class="bar-bg">
                  <div class="bar-fill" style="width:${percent}%"></div>
                </div>
                <span class="bar-pct">${percent}%</span>
              </div>
              <div class="score-row">
                <span class="score-num">${movie.score}</span>
                <span class="score-lbl">AI Score</span>
              </div>
            </div>
          </div>`;
      });
 
      document.getElementById('cards').innerHTML = html;
      document.getElementById('results').style.display = 'block';
 
    } catch (error) {
      document.getElementById('loading').style.display = 'none';
      showError('Something went wrong. Make sure the server is running.');
    }
  }
 
  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }
 
  function clearAll() {
    document.getElementById('error').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('cards').innerHTML = '';
  }
</script>
</body>
</html>
