<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0c29;
    --bg2:       #1a1740;
    --bg3:       #16133a;
    --border:    rgba(255,255,255,0.10);
    --border2:   rgba(167,139,250,0.35);
    --x-color:   #a78bfa;
    --o-color:   #f9a8d4;
    --text:      #ffffff;
    --subtext:   rgba(255,255,255,0.45);
    --grad:      linear-gradient(135deg, #667eea, #764ba2, #f093fb);
    --grad2:     linear-gradient(90deg, #a78bfa, #f093fb, #60a5fa);
    --cell-bg:   rgba(255,255,255,0.05);
    --cell-hov:  rgba(255,255,255,0.10);
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1740 40%, #0f3460 80%, #533483 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* floating orbs */
  .orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
  .orb1 { width: 300px; height: 300px; background: radial-gradient(circle, #667eea33, transparent 70%); top: -80px; left: -80px; animation: orb1 8s ease-in-out infinite; }
  .orb2 { width: 350px; height: 350px; background: radial-gradient(circle, #f093fb22, transparent 70%); bottom: -100px; right: -100px; animation: orb2 10s ease-in-out infinite; }
  .orb3 { width: 200px; height: 200px; background: radial-gradient(circle, #4facfe22, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: orb3 6s ease-in-out infinite; }
  @keyframes orb1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,30px)} }
  @keyframes orb2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-30px)} }
  @keyframes orb3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.3)} }

  /* card */
  .card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }

  /* title */
  .title {
    text-align: center;
    font-size: 26px;
    font-weight: 800;
    background: var(--grad2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    animation: title-glow 3s ease-in-out infinite alternate;
  }
  @keyframes title-glow {
    from { filter: drop-shadow(0 0 8px rgba(167,139,250,0.4)); }
    to   { filter: drop-shadow(0 0 18px rgba(240,147,251,0.7)); }
  }
  .subtitle {
    text-align: center;
    font-size: 10px;
    color: var(--subtext);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* difficulty */
  .diff-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; background: var(--bg2); border-radius: 12px; padding: 8px 12px; border: 1px solid var(--border); }
  .diff-label { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
  .diff-btns { display: flex; gap: 6px; flex: 1; }
  .diff-btn {
    flex: 1; padding: 6px 0; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--subtext); font-family: 'Poppins', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all .25s;
  }
  .diff-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .diff-btn.active { background: linear-gradient(90deg,#667eea,#764ba2); border-color: transparent; color: white; box-shadow: 0 4px 14px rgba(102,126,234,0.45); }

  /* scoreboard */
  .scores { display: flex; gap: 10px; margin-bottom: 18px; }
  .score-card {
    flex: 1; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 8px; text-align: center;
    transition: transform .2s;
  }
  .score-card:hover { transform: translateY(-2px); }
  .score-card .lbl { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .score-card .num { font-size: 26px; font-weight: 700; }
  .score-card.you .num  { color: var(--x-color); }
  .score-card.draw .num { color: rgba(255,255,255,0.6); }
  .score-card.ai .num   { color: var(--o-color); }

  /* status */
  .status {
    text-align: center; padding: 10px 16px; border-radius: 12px;
    background: var(--bg2); border: 1px solid var(--border);
    font-size: 13px; font-weight: 500; color: var(--x-color);
    margin-bottom: 16px; min-height: 42px; display: flex;
    align-items: center; justify-content: center;
    transition: color .3s;
  }

  /* board */
  .board-wrap { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 18px; padding: 12px; margin-bottom: 16px; }
  .board { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .cell {
    aspect-ratio: 1; background: var(--cell-bg); border: 1px solid var(--border);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 700; cursor: pointer;
    transition: all .2s; user-select: none; position: relative; overflow: hidden;
  }
  .cell::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
    opacity: 0; transition: opacity .3s;
  }
  .cell:hover:not(.taken)::before { opacity: 1; }
  .cell:hover:not(.taken) { background: var(--cell-hov); border-color: rgba(255,255,255,0.2); transform: scale(1.04); }
  .cell.taken { cursor: default; }
  .cell.x { color: var(--x-color); text-shadow: 0 0 16px rgba(167,139,250,0.8); }
  .cell.o { color: var(--o-color); text-shadow: 0 0 16px rgba(249,168,212,0.8); }
  .cell.win-x { animation: win-x .6s ease infinite alternate; }
  .cell.win-o { animation: win-o .6s ease infinite alternate; }
  @keyframes win-x {
    from { background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.4); box-shadow: 0 0 10px rgba(167,139,250,0.3); }
    to   { background: rgba(167,139,250,0.28); border-color: #a78bfa; box-shadow: 0 0 24px rgba(167,139,250,0.65); }
  }
  @keyframes win-o {
    from { background: rgba(249,168,212,0.1); border-color: rgba(249,168,212,0.4); box-shadow: 0 0 10px rgba(249,168,212,0.3); }
    to   { background: rgba(249,168,212,0.28); border-color: #f9a8d4; box-shadow: 0 0 24px rgba(249,168,212,0.65); }
  }
  @keyframes pop { 0%{transform:scale(.7);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .cell.pop { animation: pop .25s ease forwards; }

  /* restart */
  .restart {
    width: 100%; padding: 12px; border: none;
    background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
    color: white; border-radius: 12px; font-family: 'Poppins', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .3s; letter-spacing: .03em; margin-bottom: 16px;
  }
  .restart:hover { opacity: .85; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(102,126,234,0.45); }
  .restart:active { transform: translateY(0); }

  /* badges */
  .badges { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .badge {
    font-size: 10px; padding: 4px 12px; border-radius: 99px;
    border: 1px solid rgba(167,139,250,0.3);
    color: rgba(167,139,250,0.8); background: rgba(167,139,250,0.08);
    letter-spacing: .03em;
  }

  /* result overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity .3s;
    backdrop-filter: blur(4px);
  }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .result-box {
    background: rgba(26,23,64,0.95); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px; padding: 36px 40px; text-align: center;
    transform: scale(.85); transition: transform .3s;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .overlay.show .result-box { transform: scale(1); }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { font-size: 22px; font-weight: 700; color: white; margin-bottom: 6px; }
  .result-sub { font-size: 13px; color: var(--subtext); margin-bottom: 20px; }
  .result-btn {
    padding: 10px 30px; background: var(--grad);
    border: none; border-radius: 12px; color: white;
    font-family: 'Poppins', sans-serif; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .result-btn:hover { opacity: .85; }

  /* thinking dots */
  .dots { display: inline-flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--subtext); animation: blink 1s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* mobile */
  @media (max-width: 480px) {
    .card { padding: 20px 16px; }
    .title { font-size: 22px; }
    .cell { font-size: 28px; border-radius: 10px; }
    .score-card .num { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">
  <div class="title">✦ Tic-Tac-Toe AI ✦</div>
  <div class="subtitle">Minimax · Alpha-Beta Pruning</div>

  <!-- difficulty -->
  <div class="diff-wrap">
    <span class="diff-label">Difficulty</span>
    <div class="diff-btns">
      <button class="diff-btn" onclick="setDiff('Easy')">Easy</button>
      <button class="diff-btn" onclick="setDiff('Medium')">Medium</button>
      <button class="diff-btn active" onclick="setDiff('Hard')">Hard</button>
    </div>
  </div>

  <!-- scores -->
  <div class="scores">
    <div class="score-card you"><div class="lbl">You</div><div class="num" id="sc-you">0</div></div>
    <div class="score-card draw"><div class="lbl">Draw</div><div class="num" id="sc-draw">0</div></div>
    <div class="score-card ai"><div class="lbl">AI</div><div class="num" id="sc-ai">0</div></div>
  </div>

  <!-- status -->
  <div class="status" id="status">🎮 Your turn! Place ✕</div>

  <!-- board -->
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

  <!-- restart -->
  <button class="restart" onclick="newGame()">↺ &nbsp; Restart Game</button>

  <!-- badges -->
  <div class="badges">
    <span class="badge">🤖 Minimax AI</span>
    <span class="badge">✂ Alpha-Beta Pruning</span>
    <span class="badge">🏆 Unbeatable on Hard</span>
  </div>
</div>

<!-- result overlay -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-title" id="res-title">You Win!</div>
    <div class="result-sub" id="res-sub">Amazing play!</div>
    <button class="result-btn" onclick="closeResult()">Play Again</button>
  </div>
</div>

<script>
// ── State ──
let board = Array(9).fill(null);
let gameOver = false;
let difficulty = 'Hard';
let scores = { you: 0, draw: 0, ai: 0 };
const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

// ── Check Winner ──
function checkWinner(b) {
  for (const line of WINS) {
    const [a,c,d] = line;
    if (b[a] && b[a] === b[c] && b[a] === b[d])
      return { winner: b[a], line };
  }
  if (b.every(Boolean)) return { winner: 'draw', line: [] };
  return null;
}

// ── Minimax ──
function minimax(b, isMax, alpha, beta, depth, maxDepth) {
  const res = checkWinner(b);
  if (res) {
    if (res.winner === 'O') return 10 - depth;
    if (res.winner === 'X') return depth - 10;
    return 0;
  }
  if (depth === maxDepth) return 0;

  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = 'O';
        best = Math.max(best, minimax(b, false, alpha, beta, depth+1, maxDepth));
        b[i] = null;
        alpha = Math.max(alpha, best);
        if (beta <= alpha) break;
      }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = 'X';
        best = Math.min(best, minimax(b, true, alpha, beta, depth+1, maxDepth));
        b[i] = null;
        beta = Math.min(beta, best);
        if (beta <= alpha) break;
      }
    }
    return best;
  }
}

// ── Best Move ──
function getBestMove() {
  const empty = board.map((v,i) => !v ? i : null).filter(i => i !== null);
  if (difficulty === 'Easy') return empty[Math.floor(Math.random() * empty.length)];
  const maxDepth = difficulty === 'Medium' ? 2 : 9;
  let best = -Infinity, move = -1;
  for (const i of empty) {
    board[i] = 'O';
    const score = minimax(board, false, -Infinity, Infinity, 0, maxDepth);
    board[i] = null;
    if (score > best) { best = score; move = i; }
  }
  return move;
}

// ── Render Board ──
function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = board.map((v, i) => {
    const sym = v === 'X' ? '✕' : v === 'O' ? '○' : '';
    const cls = ['cell', v ? 'taken' : '', v === 'X' ? 'x' : v === 'O' ? 'o' : ''].join(' ').trim();
    return `<div class="${cls}" data-i="${i}" onclick="cellClick(${i})">${sym}</div>`;
  }).join('');
}

// ── Cell Click ──
function cellClick(i) {
  if (gameOver || board[i]) return;
  board[i] = 'X';
  renderBoard();
  animateCell(i);

  const res = checkWinner(board);
  if (res) { endGame(res); return; }

  gameOver = true;
  setStatus('<span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>&nbsp; AI is thinking…');

  setTimeout(() => {
    const move = getBestMove();
    if (move !== -1) board[move] = 'O';
    renderBoard();
    if (move !== -1) animateCell(move);
    gameOver = false;

    const res2 = checkWinner(board);
    if (res2) { endGame(res2); return; }
    setStatus('🎮 Your turn! Place ✕');
  }, 500);
}

// ── Animate Cell ──
function animateCell(i) {
  setTimeout(() => {
    const cells = document.querySelectorAll('.cell');
    if (cells[i]) {
      cells[i].classList.add('pop');
      setTimeout(() => cells[i].classList.remove('pop'), 300);
    }
  }, 10);
}

// ── End Game ──
function endGame(res) {
  gameOver = true;
  if (res.winner !== 'draw' && res.line) {
    highlightWin(res.line, res.winner);
  }
  setTimeout(() => {
    if (res.winner === 'X') {
      scores.you++;
      document.getElementById('sc-you').textContent = scores.you;
      showResult('🎉', 'You Win!', 'Amazing! You beat the AI!');
      setStatus('🎉 You win! Incredible!');
    } else if (res.winner === 'O') {
      scores.ai++;
      document.getElementById('sc-ai').textContent = scores.ai;
      showResult('🤖', 'AI Wins!', 'The Minimax algorithm found the perfect move!');
      setStatus('🤖 AI wins! Try again!');
    } else {
      scores.draw++;
      document.getElementById('sc-draw').textContent = scores.draw;
      showResult('🤝', "It's a Draw!", 'Perfect play from both sides!');
      setStatus("🤝 It's a draw!");
    }
  }, 800);
}

// ── Highlight Win ──
function highlightWin(line, winner) {
  const cells = document.querySelectorAll('.cell');
  line.forEach(i => {
    cells[i].classList.add(winner === 'X' ? 'win-x' : 'win-o');
  });
}

// ── Show Result ──
function showResult(emoji, title, sub) {
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = sub;
  document.getElementById('overlay').classList.add('show');
}

// ── Close Result ──
function closeResult() {
  document.getElementById('overlay').classList.remove('show');
  newGame();
}

// ── Set Status ──
function setStatus(html) {
  document.getElementById('status').innerHTML = html;
}

// ── Set Difficulty ──
function setDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === d);
  });
  newGame();
}

// ── New Game ──
function newGame() {
  board = Array(9).fill(null);
  gameOver = false;
  document.getElementById('overlay').classList.remove('show');
  setStatus('🎮 Your turn! Place ✕');
  renderBoard();
}

// ── Init ──
newGame();
</script>
</body>
</html>
